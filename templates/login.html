{% extends "base.html" %}

{% block title %}Login - VitalGuard{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card auth-card fade-in">
        <div class="card-header text-center">
            <h2>Welcome Back</h2>
        </div>
        
        {% if error %}
            <div class="alert" style="color: var(--danger); margin-bottom: 1.5rem; text-align: center; background: #fff5f5; padding: 0.8rem; border-radius: 8px;">
                {{ error }}
            </div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="yourname@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-large">Sign In</button>
        </form>
        
        <div style="margin-top: 2rem; text-align: center; border-top: 1px solid #eee; padding-top: 1.5rem;">
            <p class="small-text" style="color: var(--text-secondary);">New to VitalGuard? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
